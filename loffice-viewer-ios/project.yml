name: LofficeViewer
options:
  bundleIdPrefix: com.lofficeviewer
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
settings:
  MARKETING_VERSION: "1.0.0"
  CURRENT_PROJECT_VERSION: "1"
  SWIFT_VERSION: "5.9"
  DEVELOPMENT_TEAM: ""
targets:
  LofficeViewer:
    type: application
    platform: iOS
    sources:
      - path: LofficeViewer
      - path: Resources/hwp
        type: folder
        buildPhase: resources
      - path: Resources/Assets.xcassets
      - path: Resources/looffice_logo.png
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lofficeviewer.app
        INFOPLIST_KEY_CFBundleDisplayName: "로피스뷰어"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        ENABLE_PREVIEWS: YES
    info:
      path: LofficeViewer/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        CFBundleDocumentTypes:
          - CFBundleTypeName: PDF Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
          - CFBundleTypeName: Plain Text
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
          - CFBundleTypeName: Office Document
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - org.openxmlformats.wordprocessingml.document
              - org.openxmlformats.presentationml.presentation
              - org.openxmlformats.spreadsheetml.sheet
        UTImportedTypeDeclarations: []
        LSSupportsOpeningDocumentsInPlace: true
        UIFileSharingEnabled: true
